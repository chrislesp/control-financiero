<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Control Financiero</title>
  <link rel="stylesheet" href="./css/styles.css" />
</head>
<body>
  <aside class="sidebar">
    <div class="section">
      <h3>Categorías</h3>
      <button id="openCategoryBtn" type="button">+ Añadir categoría</button>
      <div id="categoryList"></div>
    </div>

    <div class="section">
      <h3>Periodos</h3>
      <button id="openPeriodBtn" type="button">+ Añadir periodo</button>
      <div id="periodList"></div>
    </div>
  </aside>

  <main class="main">
    <div class="topbar calendar-header">
      <div class="app-title">Control Financiero</div>
        <div class="calendar-nav">
          <button id="prevMonthBtn" type="button">←</button>
          <h2 id="calendarTitle">Calendario</h2>
          <button id="nextMonthBtn" type="button">→</button>
        </div>
      </div>

      <div class="month-summary" id="monthSummary">
        <div class="summary-card">
          <span class="summary-label">Ingresos del mes</span>
          <strong class="summary-value ingreso" id="monthIncome">$0.00</strong>
        </div>
        <div class="summary-card">
          <span class="summary-label">Gastos del mes</span>
          <strong class="summary-value gasto" id="monthExpense">$0.00</strong>
        </div>
        <div class="summary-card">
          <span class="summary-label">Balance del mes</span>
          <strong class="summary-value" id="monthBalance">$0.00</strong>
        </div>
      </div>
    </div>

    <div class="view-switcher">
      <button id="calendarViewBtn" class="view-btn active" type="button">Calendario</button>
      <button id="listViewBtn" class="view-btn" type="button">Lista</button>
    </div>

    <section id="calendarView" class="view-section active-view">
      <div class="weekday-row">
        <div>Dom</div>
        <div>Lun</div>
        <div>Mar</div>
        <div>Mié</div>
        <div>Jue</div>
        <div>Vie</div>
        <div>Sáb</div>
      </div>
      <div class="grid-container" id="calendarGrid"></div>
    </section>

    <section id="listView" class="view-section hidden-view">
      <div class="list-container" id="listContainer"></div>
    </section>
  </main>

  <div class="popup-bg" id="categoryPopup">
    <div class="popup">
      <h3>Nueva categoría</h3>
      <input id="catTitulo" type="text" placeholder="Título de la categoría" />
      <input id="catBudget" type="number" step="0.01" min="0" placeholder="Budget de la categoría" />
      <div class="popup-buttons">
        <button id="closeCategoryBtn" type="button">Cancelar</button>
        <button id="addCategoryBtn" type="button">Guardar</button>
      </div>
    </div>
  </div>

  <div class="popup-bg" id="periodPopup">
    <div class="popup">
      <h3>Nuevo periodo</h3>
      <label class="field-label" for="periodStart">Fecha inicio</label>
      <input id="periodStart" type="date" />
      <label class="field-label" for="periodEnd">Fecha final</label>
      <input id="periodEnd" type="date" />
      <input id="periodBudget" type="number" step="0.01" min="0" placeholder="Budget del periodo" />
      <div class="popup-buttons">
        <button id="closePeriodBtn" type="button">Cancelar</button>
        <button id="addPeriodBtn" type="button">Guardar</button>
      </div>
    </div>
  </div>

  <div class="popup-bg" id="transactionPopup">
    <div class="popup">
      <h3>Nuevo movimiento</h3>
      <div class="selected-date-box">
        <span>Fecha seleccionada:</span>
        <strong id="selectedDateLabel">Sin seleccionar</strong>
      </div>

      <select id="categoriaSelect">
        <option value="">Seleccionar categoría</option>
      </select>
      <textarea id="descripcion" placeholder="Descripción"></textarea>
      <input id="cantidad" type="number" step="0.01" min="0" placeholder="Cantidad" />
      <select id="tipoMovimiento">
        <option value="gasto">Gasto</option>
        <option value="ingreso">Ingreso</option>
      </select>

      <div class="popup-buttons">
        <button id="closeTransactionBtn" type="button">Cancelar</button>
        <button id="addTransactionBtn" type="button">Guardar</button>
      </div>
    </div>
  </div>

  <script type="module" src="./js/main.js"></script>
</body>
</html>
